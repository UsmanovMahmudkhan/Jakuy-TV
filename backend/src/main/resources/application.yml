spring:
  application:
    name: jakuy-tv-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jakuy:
  import:
    uzbek-url: https://iptv-org.github.io/iptv/countries/uz.m3u
    fallback-url: https://iptv-org.github.io/iptv/index.m3u
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  streamcheck:
    timeout-ms: 5000
    max-per-request: 50

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:jakuy_tv;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jakuy_tv}
    username: ${SPRING_DATASOURCE_USERNAME:jakuy}
    password: ${SPRING_DATASOURCE_PASSWORD:jakuy_password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
