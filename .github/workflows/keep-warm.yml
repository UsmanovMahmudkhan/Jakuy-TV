name: Keep backend warm

# Pings the backend's /health endpoint so the free-tier instance does not spin
# down and force a slow cold start on the next visitor.
#
# Setup: add a repository secret BACKEND_URL with the backend's base URL
# (e.g. https://jakuy-backend.onrender.com). If the secret is unset the job
# is skipped.
#
# NOTE: GitHub's scheduled runs can be delayed by several minutes under load and
# are auto-disabled after 60 days of repo inactivity. For production, an external
# uptime pinger (cron-job.org / UptimeRobot) hitting /health is more reliable —
# see the README.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set; skipping keep-warm ping."
            exit 0
          fi
          base="${BACKEND_URL%/}"
          echo "Pinging $base/health"
          curl --fail --silent --show-error --max-time 90 --retry 3 --retry-all-errors "$base/health"
