services:
  postgres:
    image: postgres:16
    container_name: jakuy-postgres
    environment:
      POSTGRES_DB: jakuy_tv
      POSTGRES_USER: jakuy
      POSTGRES_PASSWORD: jakuy_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jakuy -d jakuy_tv"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: jakuy-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jakuy_tv
      SPRING_DATASOURCE_USERNAME: jakuy
      SPRING_DATASOURCE_PASSWORD: jakuy_password
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_APP_NAME: Jakuy TV
    container_name: jakuy-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
